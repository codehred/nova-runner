services:
  backend:
    build:
      context: ./backend
    container_name: nova-runner-backend
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      DB_PATH: /app/data/nova-runner.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    volumes:
      - nova-runner-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: nova-runner-frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nova-runner-data:
